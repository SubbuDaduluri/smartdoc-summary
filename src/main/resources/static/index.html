<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Document Summary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Smart Document Summary</h1>
        <p>Upload a PDF, DOC, or DOCX file to get a summarized version.</p>

        <form id="uploadForm">
            <div class="form-group">
                <label for="fileInput">Select File:</label>
                <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required>
            </div>
            <button type="submit" id="submitBtn">Summarize Document</button>
        </form>

        <div id="loading" class="hidden">
            <p>Processing your document...</p>
        </div>

        <div id="result" class="hidden">
            <h2>Summary</h2>
            <div id="summaryText"></div>
        </div>

        <div id="error" class="hidden">
            <p id="errorText"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
