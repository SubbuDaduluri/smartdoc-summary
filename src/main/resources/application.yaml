server:
  port: 8080

spring:
  application:
    name: smartdoc-summary

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3

    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

presidio:
  url: http://localhost:5002

token:
  store: in-memory

app:
  llm:
    provider: ollama


logging:
  level:
    root: DEBUG
    com.subbu.smartdoc: DEBUG